name: docker-image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main

jobs:
  base-stage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_base:
          - name: ubuntu:22.04
            image: ghcr.io/ajakhotia/infracommons/weekly/ubuntu:22.04
          - name: ubuntu:24.04
            image: ghcr.io/ajakhotia/infracommons/weekly/ubuntu:24.04

    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: setup-login
        id: setup-login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: setup-buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4

      - name: job-cache-base
        id: job-cache-base
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: job-cache/${{ matrix.os_base.name }}/base

      - name: image-name-base
        id: image-name-base
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base.name }}/base

      - name: base
        id: base
        uses: ./external/infraCommons/.github/actions/docker-typical-build-push
        with:
          dockerfile: docker/ubuntu.dockerfile
          target-stage: base
          cache-backend: registry
          image-name: ${{ steps.image-name-base.outputs.name }}
          shared-cache-to: ${{ steps.job-cache-base.outputs.name }}:cache
          build-args: |
            OS_BASE=${{ matrix.os_base.image }}


  aggregate-base-stage:
    name: aggregate-base-stage
    if: always()
    needs: [base-stage]
    runs-on: ubuntu-latest
    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: aggregate
        id: aggregate
        uses: ./external/infraCommons/.github/actions/matrix-aggregate
        with:
          result: ${{ needs.base-stage.result }}


  build-package:
    needs: base-stage
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        os_base:
          - name: ubuntu:22.04
            slug: ubuntu-22-04
          - name: ubuntu:24.04
            slug: ubuntu-24-04
        preset:
          - gnu-default-shared
          - gnu-default-static
          - gnu-14-shared
          - gnu-14-static
          - clang-default-shared
          - clang-default-static
          - clang-21-shared
          - clang-21-static

    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: setup-login
        id: setup-login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image-name-base
        id: image-name-base
        uses: ./external/infraCommons/.github/actions/oci-compliant-image-name
        with:
          build-name: ${{ matrix.os_base.name }}/base

      - name: docker-metadata
        id: docker-metadata
        uses: docker/metadata-action@v6
        with:
          tags: |
            type=sha,format=long

      - name: archive-name
        id: archive-name
        shell: bash
        run: |
          stem="robotFarm-${{ matrix.os_base.slug }}-${{ matrix.preset }}"
          echo "stem=${stem}"                                                          >> "${GITHUB_OUTPUT}"
          echo "file=${stem}-${{ steps.docker-metadata.outputs.version }}.tar.zst"     >> "${GITHUB_OUTPUT}"

      - name: build-and-package
        id: build-and-package
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/archive"

          docker run --rm                                                                                 \
            --volume "${GITHUB_WORKSPACE}":/tmp/robotFarm-src:ro                                          \
            --volume "robotfarm-ccache-${{ matrix.os_base.slug }}":/ccache                                \
            --volume "${RUNNER_TEMP}/archive":/archive                                                    \
            --env CCACHE_DIR=/ccache                                                                      \
            --env CCACHE_MAXSIZE=20G                                                                      \
            "${{ steps.image-name-base.outputs.name }}:${{ steps.docker-metadata.outputs.version }}"      \
            bash -c '
              set -euo pipefail

              ccache --zero-stats

              cmake -S /tmp/robotFarm-src                                       \
                    -B /tmp/robotFarm-build                                     \
                    --preset ${{ matrix.preset }}                               \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache                          \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

              apt-get update
              apt-get install -y --no-install-recommends                        \
                $(cat /tmp/robotFarm-build/systemDependencies.txt)

              cmake --build   /tmp/robotFarm-build
              cmake --install /tmp/robotFarm-build

              ccache --show-stats

              tar --zstd -C /opt -cf /archive/${{ steps.archive-name.outputs.file }} robotFarm
            '

      - name: upload-artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive-name.outputs.stem }}
          path: ${{ runner.temp }}/archive/${{ steps.archive-name.outputs.file }}
          retention-days: 14
          if-no-files-found: error

      - name: publish-release
        id: publish-release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/archive/${{ steps.archive-name.outputs.file }}
          fail_on_unmatched_files: true


  aggregate-build-package:
    name: aggregate-build-package
    if: always()
    needs: [build-package]
    runs-on: ubuntu-latest
    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: aggregate
        id: aggregate
        uses: ./external/infraCommons/.github/actions/matrix-aggregate
        with:
          result: ${{ needs.build-package.result }}


  find-package:
    needs: build-package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os_base:
          - name: ubuntu:22.04
            slug: ubuntu-22-04
          - name: ubuntu:24.04
            slug: ubuntu-24-04
        preset:
          - gnu-default-shared
          - gnu-default-static
          - gnu-14-shared
          - gnu-14-static
          - clang-default-shared
          - clang-default-static
          - clang-21-shared
          - clang-21-static
        library-name:
          - absl
          - AMD
          - Boost
          - CAMD
          - CapnProto
          - CCOLAMD
          - Ceres
          - CHOLMOD
          - COLAMD
          - Eigen3
          - flatbuffers
          - Gflags
          - Glog
          - GTest
          - nlohmann_json
          - oatpp
          - oatpp-websocket
          - OGRE
          - OpenCV
          - protobuf
          - Python3
          - spdlog
          - SPQR
          - SuiteSparse_config
          - VTK

    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: archive-name
        id: archive-name
        shell: bash
        run: |
          echo "stem=robotFarm-${{ matrix.os_base.slug }}-${{ matrix.preset }}" >> "${GITHUB_OUTPUT}"

      - name: download-artifact
        id: download-artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.archive-name.outputs.stem }}
          path: ${{ runner.temp }}/artifact

      - name: find-library
        id: find-library
        uses: ./external/infraCommons/.github/actions/cmake-find-package
        with:
          image-name: ${{ matrix.os_base.name }}
          library-name: ${{ matrix.library-name }}
          prefix-path: /opt/robotFarm
          volumes: |
            ${{ runner.temp }}/artifact:/tmp/artifact:ro
            ${{ github.workspace }}/systemDependencies.json:/tmp/systemDependencies.json:ro
            ${{ github.workspace }}/external/infraCommons/tools/extractDependencies.sh:/tmp/extractDependencies.sh:ro
          pre-check: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends jq
            apt-get install -y --no-install-recommends \
              $(sh /tmp/extractDependencies.sh Basics /tmp/systemDependencies.json)
            tar --zstd -C /opt -xf /tmp/artifact/robotFarm-*.tar.zst
            apt-get install -y --no-install-recommends \
              $(cat /opt/robotFarm/systemDependencies.txt)


  aggregate-find-package:
    name: aggregate-find-package
    if: always()
    needs: [find-package]
    runs-on: ubuntu-latest
    steps:
      - name: self-checkout
        id: self-checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: aggregate
        id: aggregate
        uses: ./external/infraCommons/.github/actions/matrix-aggregate
        with:
          result: ${{ needs.find-package.result }}
